<h1>41 Nil Receivers: `nil` でもメソッド呼び出し自体は書ける</h1>
<p>このハンズオンは、Go の少し意外な性質を扱います。ポインタレシーバのメソッドは、対象が <code>nil</code> でも呼び出しの形自体は書けます。</p>
<p>もちろん安全に使うには、メソッド内で <code>nil</code> チェックが必要です。そこをしないと、実体に触れた瞬間に落ちます。</p>
<p>この性質を知っておくと、後で <code>nil</code> を含む設計を読むときに混乱しにくくなります。「呼べる」と「安全に処理できる」は別だと分かるからです。</p>
<p>この回は頻出ではありませんが、Go のポインタとメソッドの関係を少し深く理解するのに役立ちます。</p>
