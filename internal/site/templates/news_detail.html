{{define "news_detail"}}
<!doctype html>
<html lang="ja">
{{template "head" .}}
<body>
  <div class="page-shell">
    {{template "site_header" .}}
    <main>
      {{$page := .Page}}
      <article class="detail-page">
        <p class="eyebrow">{{$page.Category}}</p>
        <h1>{{$page.Title}}</h1>
        <p class="meta">{{$page.Date}}</p>
        <p class="hero-copy">{{$page.Summary}}</p>
        <div class="content-stack">
          {{range $page.Body}}
          <p>{{.}}</p>
          {{end}}
        </div>
        <p><a class="text-link" href="/news">NEWS一覧へ戻る</a></p>
      </article>
    </main>
    {{template "site_footer" .}}
  </div>
</body>
</html>
{{end}}
